<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="800" height="200" rx="15" fill="url(#grad1)" />
  
  <!-- Abstract Branching Lines -->
  <path d="M50 100 H150 L200 50 H300" stroke="white" stroke-width="4" fill="none" opacity="0.4" />
  <path d="M150 100 L200 150 H350" stroke="white" stroke-width="4" fill="none" opacity="0.4" />
  <circle cx="150" cy="100" r="8" fill="white" opacity="0.8" />
  <circle cx="300" cy="50" r="6" fill="white" opacity="0.6" />
  <circle cx="350" cy="150" r="6" fill="white" opacity="0.6" />

  <text x="400" y="90" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle" filter="url(#shadow)">
    Awesome Backend Branching
  </text>
  <text x="400" y="130" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle" opacity="0.9">
    Git-style isolated environments for modern stateful architectures
  </text>
  
  <!-- Tech Icons representation -->
  <rect x="700" y="40" width="40" height="40" rx="8" fill="white" opacity="0.2" />
  <rect x="710" y="100" width="30" height="30" rx="6" fill="white" opacity="0.15" />
  <rect x="680" y="140" width="50" height="50" rx="10" fill="white" opacity="0.1" />
</svg>
